<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <div class="login-page">
                <div class="login-card">
                    <div class="login-container">
                        <div class="login-header">
                            <div class="login-logo">
                                <img src="/img/logo.svg" alt="logo" width="75" height="80">
                            </div>
                            <div class="login-title">
                                <h1>Login</h1>
                                <p>Sign in to connect</p>
                            </div>
                        </div>

                        <div class="login-divider">
                            <span>email and password</span>
                        </div>

                        <form class="login-form">
                            <div class="input-group">
                                <label class="form-label" for="email">Username</label>
                                <input class="form-input" type="email" id="email" name="email" placeholder="Enter your email">
                            </div>
                            <div class="input-group">
                                <label class="form-label" for="password">Password</label>
                                <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password">
                            </div>
                            <button type="submit" class="login-button">
                                Login
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
        </div>
        
        <script src="" async defer></script>
    </body>
</html>
